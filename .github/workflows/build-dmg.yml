# CI layout:
# - Pull requests → test + lint + typecheck only (fast feedback, no DMG)
# - Merge to main → checks, then auto-bump the patch version, tag it,
#                   package the DMG and publish a GitHub release
#                   (add "[no release]" to the commit TITLE to skip — only
#                   the first line is checked, so PR descriptions that merely
#                   mention the marker don't suppress releases)
# - Manual tag v* → checks, package, release that exact version
#                   (use this for minor/major bumps)
# - workflow_dispatch → checks + DMG artifact only, no tag/release
#
# The DMG is ad-hoc signed unless you configure Developer ID signing —
# without notarization, downloaders must right-click → Open the app once
# (Gatekeeper), which the release notes template mentions.
name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

# Default: read-only token. Only the release job gets write access.
permissions:
  contents: read

jobs:
  test:
    name: Tests
    runs-on: macos-15 # Apple Silicon runner
    steps:
      - uses: actions/checkout@v4
      - name: Run unit tests (no hardware required)
        run: swift test --package-path QuadCastKit

  lint:
    name: Lint
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: swift-format (config in .swift-format)
        run: >
          swift format lint --strict --recursive
          QuadCastKit/Sources QuadCastKit/Tests QuadCastControl

  typecheck:
    name: Type check
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      # Swift's compiler is the type checker; building the app target
      # type-checks everything `swift test` doesn't cover (SwiftUI app code).
      - name: Build app target (Debug)
        run: >
          xcodebuild -project QuadCastControl.xcodeproj
          -scheme QuadCastControl -configuration Debug
          -destination 'platform=macOS,arch=arm64'
          CODE_SIGN_IDENTITY=- build

  release:
    name: Package & release
    # Never on PRs; checks must pass first.
    if: github.event_name != 'pull_request'
    needs: [test, lint, typecheck]
    runs-on: macos-15
    permissions:
      contents: write # push the bumped tag + create releases
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history + tags, needed for version bumping

      - name: Resolve version
        id: version
        env:
          # Untrusted values go through env, never inline in the script.
          EVENT: ${{ github.event_name }}
          REF: ${{ github.ref }}
          REF_NAME: ${{ github.ref_name }}
          HEAD_MSG: ${{ github.event.head_commit.message }}
        run: |
          if [[ "$REF" == refs/tags/v* ]]; then
            # Manually pushed tag: release exactly that version.
            {
              echo "version=${REF_NAME#v}"
              echo "tag=$REF_NAME"
              echo "create_tag=false"
              echo "release=true"
            } >> "$GITHUB_OUTPUT"
          elif [[ "$REF" == "refs/heads/main" && "$EVENT" == "push" && "$(head -n1 <<< "$HEAD_MSG")" != *"[no release]"* ]]; then
            # Merge to main: bump the patch of the latest v* tag.
            latest=$(git tag -l 'v*' --sort=-v:refname | head -1)
            latest=${latest:-v0.0.0}
            IFS=. read -r major minor patch <<< "${latest#v}"
            next="v$major.$minor.$((patch + 1))"
            {
              echo "version=${next#v}"
              echo "tag=$next"
              echo "create_tag=true"
              echo "release=true"
            } >> "$GITHUB_OUTPUT"
          else
            # workflow_dispatch or [no release]: artifact only.
            {
              echo "version=0.0.0-$(git rev-parse --short HEAD)"
              echo "tag="
              echo "create_tag=false"
              echo "release=false"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Build Release and create DMG
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: ./scripts/make-dmg.sh "$VERSION"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: QuadCastControl-${{ steps.version.outputs.version }}
          path: dist/*.dmg
          if-no-files-found: error

      - name: Create and push tag (merges to main)
        if: steps.version.outputs.create_tag == 'true'
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "$TAG"
          git push origin "$TAG"

      - name: Publish GitHub release
        if: steps.version.outputs.release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          files: dist/*.dmg
          generate_release_notes: true
          body: |
            ### Install
            Open the DMG and drag **QuadCastControl** to **Applications**.

            This build is not notarized: on first launch, right-click the app
            and choose **Open** (once) to pass Gatekeeper.
